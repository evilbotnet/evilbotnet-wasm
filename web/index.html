<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#060a09" />
<title>EVILBOTNET</title>
<style>
  :root { --grn:#3cff82; --red:#ff3c46; --amber:#ffbe46; --blu:#7ad0ff; --tea:#46e6c8; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: #040605; color: var(--grn);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overscroll-behavior: none; -webkit-user-select: none; user-select: none; touch-action: none;
  }
  body { display: flex; align-items: center; justify-content: center; }
  #stage {
    position: relative; aspect-ratio: 450 / 780;
    height: min(100svh, calc(100vw * 780 / 450)); max-height: 100svh;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 50px rgba(60,255,130,.16), 0 10px 40px rgba(0,0,0,.6); will-change: transform;
  }
  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; background: #060a09; }

  #vignette { position:absolute; inset:0; pointer-events:none; z-index:2;
    background: radial-gradient(ellipse 78% 66% at 50% 46%, transparent 52%, rgba(0,0,0,.62) 100%); }
  #scan { position:absolute; inset:0; pointer-events:none; z-index:3; opacity:.45; mix-blend-mode:multiply;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.12) 2px 3px); }

  #hud { position:absolute; inset:0; pointer-events:none; z-index:5; }
  #top { position:absolute; top:0; left:0; right:0; height:72px; display:flex; align-items:center;
    justify-content:space-between; padding:8px 12px; gap:8px; font-size: clamp(11px,3vmin,15px);
    background: linear-gradient(#060a09ee, #060a0900); text-shadow: 0 0 6px rgba(60,255,130,.4); }
  .stat b { display:block; font-size: clamp(15px,4.6vmin,22px); font-weight:800; line-height:1; }
  .stat span { opacity:.6; font-size: 10px; letter-spacing:1px; }
  #s-lvl b { color: var(--amber); } #s-bots b { color: #eafff1; } #s-nodes b { color: var(--grn); }
  #bar { position:absolute; top:72px; left:0; height:3px; background: var(--grn); width:0%;
    box-shadow: 0 0 8px var(--grn); transition: width .15s linear; }
  #heatbar { position:absolute; top:75px; left:0; height:2px; background: var(--red); width:0%; opacity:.85;
    box-shadow: 0 0 8px var(--red); transition: width .25s linear; }

  #abilities { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); pointer-events:none;
    z-index:6; display:flex; gap:7px; }
  .ab { pointer-events:auto; width:74px; height:46px; border-radius:12px; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border:1px solid rgba(120,160,140,.35); background:rgba(8,16,12,.62); color:#9fb6ab;
    backdrop-filter:blur(2px); --ac:var(--grn); }
  .ab .fill { position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--ac); opacity:.18; z-index:0; }
  .ab .lab { position:relative; z-index:2; font-weight:800; font-size:13px; letter-spacing:1px; }
  .ab .key { position:relative; z-index:2; font-size:9px; opacity:.55; margin-top:1px; letter-spacing:1px; }
  .ab.ready { border-color:var(--ac); color:var(--ac); box-shadow:0 0 13px color-mix(in srgb, var(--ac) 45%, transparent); }
  .ab.ready .fill { width:100% !important; opacity:.26; }
  .ab-surge { --ac:#eafff1; } .ab-emp { --ac:var(--blu); } .ab-fork { --ac:var(--grn); } .ab-cloak { --ac:var(--tea); }

  #exit { position:absolute; top:9px; right:10px; z-index:6; pointer-events:auto; display:none;
    align-items:center; justify-content:center; height:26px; padding:0 11px; border-radius:13px;
    font-size:11px; font-weight:800; letter-spacing:1px; color:#caa; cursor:pointer;
    border:1px solid rgba(255,80,90,.3); background:rgba(20,8,9,.55); backdrop-filter:blur(2px); }
  #exit.armed { color:#fff; border-color:var(--red); background:rgba(70,12,16,.8); box-shadow:0 0 12px rgba(255,60,70,.4); }

  .panel { position:absolute; inset:0; display:none; z-index:7; pointer-events:none; flex-direction:column; align-items:center;
    justify-content:center; gap:14px; text-align:center; padding:24px;
    background: radial-gradient(ellipse at center, rgba(4,6,5,.6), rgba(4,6,5,.93)); }
  .panel.show { display:flex; }
  #title { font-size: clamp(26px,8.5vmin,46px); font-weight:900; letter-spacing:3px; color:#eafff1;
    text-shadow: 0 0 18px rgba(60,255,130,.6); pointer-events:none; }
  #title.bad { color:#ffd2d4; text-shadow: 0 0 18px rgba(255,60,70,.6); }
  #sub { font-size: clamp(12px,3.6vmin,16px); color:#9fdcb6; max-width:300px; line-height:1.5; pointer-events:none; }
  #blink { color: var(--amber); font-weight:800; letter-spacing:1px; pointer-events:none;
    animation: blink 1.1s steps(2,start) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  /* upgrade draft */
  #draftTitle { font-size: clamp(18px,5.5vmin,26px); font-weight:900; letter-spacing:2px; color:var(--grn);
    text-shadow:0 0 14px rgba(60,255,130,.5); pointer-events:none; }
  #draftSub { font-size:12px; color:#9fdcb6; opacity:.8; pointer-events:none; letter-spacing:1px; }
  #cards { display:flex; flex-direction:column; gap:10px; width:min(86%,330px); margin-top:4px; }
  #buildStats { display:grid; grid-template-columns:1fr 1fr; gap:2px 18px; width:min(86%,330px);
    font-size:11px; color:#9fdcb6; opacity:.92; margin:2px 0; padding:9px 11px; border-radius:10px;
    background:rgba(10,20,15,.5); border:1px solid rgba(60,255,130,.14); letter-spacing:.5px; }
  #buildStats .row { display:flex; justify-content:space-between; }
  #buildStats .sv { color:#eafff1; font-weight:700; }
  #buildStats .full { grid-column:1/3; }
  #buildStats .full .sv { color:var(--tea); }
  .legend { display:flex; flex-direction:column; gap:3px; width:min(86%,330px); margin-top:4px;
    font-size:10.5px; color:#9fdcb6; opacity:.9; letter-spacing:.4px; pointer-events:none; }
  .legend .lr { display:flex; align-items:center; gap:7px; }
  .legend i { width:10px; height:10px; border-radius:50%; flex:none; box-shadow:0 0 5px currentColor; }
  .legend .fw { width:13px; height:3px; border-radius:1px; }
  .card { pointer-events:auto; cursor:pointer; border:1px solid rgba(60,255,130,.35); border-radius:12px;
    padding:13px 15px; background:rgba(10,20,15,.7); text-align:left; transition: border-color .1s, transform .05s;
    animation: cardIn .45s ease both; }
  .card:active { transform: scale(.985); }
  .card.armed { border-color: rgba(60,255,130,.7); }
  @keyframes cardIn { from { opacity:.2; } to { opacity:1; } }
  .card .cn { font-weight:900; font-size:15px; letter-spacing:1px; color:#eafff1; }
  .card.unlock .cn { color: var(--amber); }
  .card .cd { font-size:12px; color:#9fdcb6; margin-top:3px; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="screen" width="450" height="780"></canvas>
    <div id="vignette"></div>
    <div id="scan"></div>
    <div id="hud">
      <div id="top">
        <div class="stat" id="s-lvl"><b>1</b><span>LEVEL</span></div>
        <div class="stat" id="s-bots" style="text-align:center"><b>0</b><span>BOTS</span></div>
        <div class="stat" id="s-nodes" style="text-align:right"><b>0/3</b><span>NODES</span></div>
      </div>
      <div id="bar"></div>
      <div id="heatbar"></div>
    </div>
    <div id="abilities"></div>
    <div id="exit">EXIT</div>

    <div id="menu" class="panel show">
      <div id="title">EVILBOTNET</div>
      <div id="sub">Loading core&hellip;</div>
      <div class="legend" id="legendMenu"></div>
      <div id="blink">&nbsp;</div>
    </div>

    <div id="draft" class="panel">
      <div id="draftTitle">NODE SECURED</div>
      <div id="draftSub">DRAFT AN UPGRADE</div>
      <div id="buildStats"></div>
      <div id="cards"></div>
    </div>

    <div id="over" class="panel">
      <div id="title2" style="font-size:clamp(24px,7.5vmin,40px);font-weight:900;letter-spacing:3px;color:#ffd2d4;text-shadow:0 0 18px rgba(255,60,70,.5)">SWARM WIPED</div>
      <div id="overSub" style="font-size:clamp(13px,4vmin,17px);color:#9fdcb6;line-height:1.5"></div>
      <div id="overStats" style="display:grid;grid-template-columns:1fr 1fr;gap:2px 18px;width:min(86%,330px);font-size:11px;color:#9fdcb6;opacity:.92;padding:9px 11px;border-radius:10px;background:rgba(10,20,15,.5);border:1px solid rgba(60,255,130,.14);letter-spacing:.5px"></div>
      <div class="legend" id="legendOver"></div>
      <div style="color:var(--amber);font-weight:800;letter-spacing:1px;animation:blink 1.1s steps(2,start) infinite">TAP TO RUN AGAIN</div>
    </div>
  </div>

<script>
(function () {
  const stage=document.getElementById("stage"), canvas=document.getElementById("screen");
  const ctx=canvas.getContext("2d",{alpha:false}); ctx.imageSmoothingEnabled=false;
  const $=(id)=>document.getElementById(id);
  const elLvl=$("s-lvl").querySelector("b"), elBots=$("s-bots").querySelector("b"), elNodes=$("s-nodes").querySelector("b"),
        elBar=$("bar"), elHeat=$("heatbar"),
        menu=$("menu"), mTitle=$("title"), mSub=$("sub"), mBlink=$("blink"),
        draftEl=$("draft"), cardsEl=$("cards"), overEl=$("over"), overSub=$("overSub");

  let w=null, ready=false, loading=false, started=false;
  let W=450, H=780, imageData=null, fbPtr=0;
  let meta="menu"; // menu | playing | draft | over

  let bestLevel=0, bestScore=0;
  try{ bestLevel=parseInt(localStorage.getItem("evilbotnet_best")||"0")||0;
       bestScore=parseInt(localStorage.getItem("evilbotnet_bestscore")||"0")||0; }catch(e){}
  function saveBest(){ try{ localStorage.setItem("evilbotnet_best",String(bestLevel));
       localStorage.setItem("evilbotnet_bestscore",String(bestScore)); }catch(e){} }

  const run={ level:1, score:0, mods:null, unlocked:null };
  function defaultRun(){
    run.level=1; run.score=0;
    run.mods={ swarmCap:700, startBots:90, infect:1.0, botSpeed:1.0, cooldown:1.0 };
    run.unlocked={ surge:true, emp:false, fork:false, cloak:false };
  }

  const CAP_SWARM=3200, CAP_INFECT=6.0, CAP_SPEED=3.0, MIN_CD=0.2, CAP_START=600;
  const UPGRADES=[
    {id:"cap",  name:"BIGGER BOTNET",  desc:"+400 max swarm size",        apply:(m)=>m.swarmCap=Math.min(m.swarmCap+400,CAP_SWARM), maxed:(m)=>m.swarmCap>=CAP_SWARM},
    {id:"inf",  name:"FASTER SPREAD",  desc:"+25% infection rate",        apply:(m)=>m.infect=Math.min(m.infect*1.25,CAP_INFECT), maxed:(m)=>m.infect>=CAP_INFECT-1e-6},
    {id:"spd",  name:"OVERCLOCK",      desc:"+12% bot speed",             apply:(m)=>m.botSpeed=Math.min(m.botSpeed*1.12,CAP_SPEED), maxed:(m)=>m.botSpeed>=CAP_SPEED-1e-6},
    {id:"res",  name:"DEEP RESERVES",  desc:"+40 starting bots",          apply:(m)=>m.startBots=Math.min(m.startBots+40,CAP_START), maxed:(m)=>m.startBots>=CAP_START},
    {id:"cd",   name:"RAPID TOOLING",  desc:"-15% ability cooldowns",     apply:(m)=>m.cooldown=Math.max(m.cooldown*0.85,MIN_CD), maxed:(m)=>m.cooldown<=MIN_CD+1e-6},
    {id:"emp",  name:"UNLOCK: EMP",    desc:"Freeze nearby sentinels (Q)",   unlock:"emp",   apply:(m,u)=>u.emp=true},
    {id:"fork", name:"UNLOCK: FORK",   desc:"Mass +180 bots instantly (F)",  unlock:"fork",  apply:(m,u)=>u.fork=true},
    {id:"cloak",name:"UNLOCK: CLOAK",  desc:"Vanish from the EDR (C)",        unlock:"cloak", apply:(m,u)=>u.cloak=true},
  ];
  // always-available fallback so a draft is never empty / never a dead pick
  const FALLBACK={id:"over", name:"OVERDRIVE", desc:"+300 bonus score", apply:()=>{ run.score+=300; }};

  const ABILS=[
    {id:"surge",lab:"SURGE",key:"SPACE",cls:"ab-surge",always:true,get:()=>w.getSurge(),act:()=>w.press()},
    {id:"emp",  lab:"EMP",  key:"Q",    cls:"ab-emp",  get:()=>w.getEmp(),  act:()=>w.abEmp()},
    {id:"fork", lab:"FORK", key:"F",    cls:"ab-fork", get:()=>w.getFork(), act:()=>w.abFork()},
    {id:"cloak",lab:"CLOAK",key:"C",    cls:"ab-cloak",get:()=>w.getCloak(),act:()=>w.abCloak()},
  ];
  let abButtons=[];
  function buildAbilityBar(){
    const c=$("abilities"); c.innerHTML=""; abButtons=[];
    for(const d of ABILS){
      if(!d.always && !run.unlocked[d.id]) continue;
      const el=document.createElement("div"); el.className="ab "+d.cls;
      el.innerHTML='<div class="fill"></div><div class="lab">'+d.lab+'</div><div class="key">'+d.key+'</div>';
      el.addEventListener("pointerdown",(e)=>{ e.preventDefault(); if(ready&&w.getState()===1) d.act(); },{passive:false});
      c.appendChild(el); abButtons.push({def:d, el, fill:el.querySelector(".fill")});
    }
  }

  function configLevel(){
    const L=run.level, m=run.mods, u=run.unlocked;
    const boss = (L%5===0);
    if(boss){
      w.setNodes(2); w.setStartSent(0); w.setSentCap(14); w.setWalls(0);
      w.setSpecials(0,0,0); w.setFirewall(0); w.setBoss(1);
    } else {
      const nodes=Math.min(2+L, 12);
      const ss=Math.min(L, 6);
      const sc=Math.min(2+L, 14);
      const walls=L<=2 ? 0 : Math.min(L-2, 5);
      const spawner = L>=2 ? 1 : 0;
      const shield  = L>=3 ? (L>=7?2:1) : 0;
      const honey   = L>=4 ? (L>=8?2:1) : 0;
      const fw      = L>=4;
      w.setNodes(nodes); w.setStartSent(ss); w.setSentCap(sc); w.setWalls(walls);
      w.setSpecials(shield, spawner, honey); w.setFirewall(fw?1:0); w.setBoss(0);
    }
    w.setSwarmCap(m.swarmCap); w.setStartBots(m.startBots);
    w.setInfect(m.infect); w.setBotSpeed(m.botSpeed); w.setCooldown(m.cooldown);
    w.setUnlock(1, u.emp?1:0); w.setUnlock(2, u.fork?1:0); w.setUnlock(3, u.cloak?1:0);
    w.init(((Date.now()>>>0) ^ (L*0x9e3779b1)) >>> 0);
    w.press();
  }
  function startRun(){ defaultRun(); buildAbilityBar(); hidePanels(); configLevel(); meta="playing"; }
  function nextLevel(){ run.level++; buildAbilityBar(); hidePanels(); configLevel(); meta="playing"; }

  function hidePanels(){ menu.classList.remove("show"); draftEl.classList.remove("show"); overEl.classList.remove("show"); }

  let draftReadyAt = 0;
  function legendHTML(){
    return ''+
      '<div class="lr"><i style="color:#3ce6d2;background:#3ce6d2"></i>Spawner &mdash; floods bots when owned</div>'+
      '<div class="lr"><i style="color:#609cff;background:#609cff"></i>Shielded &mdash; SURGE on it to crack</div>'+
      '<div class="lr"><i style="color:#ffb038;background:#ffb038"></i>Honeypot &mdash; capturing it spawns sentinels</div>'+
      '<div class="lr"><i class="fw" style="color:#ff463c;background:#ff463c"></i>Firewall &mdash; time the gaps, or EMP it down</div>';
  }
  function buildStatsHTML(){
    const m=run.mods, u=run.unlocked;
    const ab=["SURGE"]; if(u.emp)ab.push("EMP"); if(u.fork)ab.push("FORK"); if(u.cloak)ab.push("CLOAK");
    const rows=[
      ["MAX SWARM", m.swarmCap],
      ["INFECTION", Math.round(m.infect*100)+"%"],
      ["BOT SPEED", Math.round(m.botSpeed*100)+"%"],
      ["COOLDOWNS", Math.round(m.cooldown*100)+"%"],
      ["START BOTS", m.startBots],
      ["ABILITIES", ab.length+"/4"],
    ];
    return rows.map(r=>'<div class="row"><span>'+r[0]+'</span><span class="sv">'+r[1]+'</span></div>').join("") +
      '<div class="row full"><span>UNLOCKED</span><span class="sv">'+ab.join(" \u00b7 ")+'</span></div>';
  }
  function showDraft(){
    const u=run.unlocked, m=run.mods;
    const pool=UPGRADES.filter(up=> up.unlock ? !u[up.unlock] : !(up.maxed && up.maxed(m)));
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
    const pick=pool.slice(0,3);
    while(pick.length<3) pick.push(FALLBACK); // never a dead/empty draft
    $("draftTitle").textContent = "LEVEL "+run.level+" SECURED";
    $("buildStats").innerHTML = buildStatsHTML();
    cardsEl.innerHTML="";
    draftReadyAt = performance.now()+500; // arm after a beat so a stray tap can't pick
    for(const up of pick){
      const el=document.createElement("div"); el.className="card"+(up.unlock?" unlock":"");
      el.innerHTML='<div class="cn">'+up.name+'</div><div class="cd">'+up.desc+'</div>';
      el.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        if(performance.now() < draftReadyAt) return;
        up.apply(run.mods, run.unlocked); nextLevel();
      },{passive:false});
      cardsEl.appendChild(el);
    }
    draftEl.classList.add("show");
    setTimeout(()=>{ for(const c of cardsEl.children) c.classList.add("armed"); }, 500);
  }

  function onGameOver(abandoned){
    if(run.level>bestLevel) bestLevel=run.level;
    if(run.score>bestScore) bestScore=run.score;
    saveBest();
    $("title2").textContent = abandoned ? "RUN ABANDONED" : "SWARM WIPED";
    overSub.innerHTML = "Reached <b style='color:#eafff1'>Level "+run.level+"</b> &middot; Score <b style='color:var(--amber)'>"+run.score+"</b><br>"+
      "Best: Level <b>"+bestLevel+"</b> &middot; "+bestScore+" pts";
    $("overStats").innerHTML = buildStatsHTML();
    $("legendOver").innerHTML = legendHTML();
    overEl.classList.add("show");
  }
  function endRun(){ if(meta==="playing"){ meta="over"; onGameOver(true); } }

  // ---- input ----
  function pt(e){ const t=(e.touches&&e.touches[0])?e.touches[0]:e; return [t.clientX,t.clientY]; }
  function rally(cx,cy){ const r=canvas.getBoundingClientRect(); w.pointerMove((cx-r.left)/r.width,(cy-r.top)/r.height); }
  canvas.addEventListener("pointerdown",(e)=>{
    e.preventDefault();
    if(!ready){ if(!loading) load(); return; }
    if(meta==="menu"){ startRun(); return; }
    if(meta==="over"){ startRun(); return; }
    if(meta==="playing"){ const [x,y]=pt(e); rally(x,y); }
  },{passive:false});
  canvas.addEventListener("pointermove",(e)=>{ if(ready&&meta==="playing"){ e.preventDefault(); const[x,y]=pt(e); rally(x,y); } },{passive:false});

  const held={l:0,r:0,u:0,d:0};
  function sendKeys(){ if(ready&&meta==="playing") w.keyDir(held.r-held.l, held.d-held.u); }
  addEventListener("keydown",(e)=>{
    if(e.code==="ArrowLeft"||e.code==="KeyA") held.l=1;
    else if(e.code==="ArrowRight"||e.code==="KeyD") held.r=1;
    else if(e.code==="ArrowUp"||e.code==="KeyW") held.u=1;
    else if(e.code==="ArrowDown"||e.code==="KeyS") held.d=1;
    else if(e.code==="Space"||e.code==="Enter"){ e.preventDefault(); if(!ready) return;
      if(meta==="menu"||meta==="over") startRun(); else if(meta==="playing") w.press(); return; }
    else if(e.code==="KeyQ"){ if(ready&&meta==="playing") w.abEmp(); return; }
    else if(e.code==="KeyF"){ if(ready&&meta==="playing") w.abFork(); return; }
    else if(e.code==="KeyC"){ if(ready&&meta==="playing") w.abCloak(); return; }
    else return;
    e.preventDefault(); sendKeys();
  });
  addEventListener("keyup",(e)=>{
    if(e.code==="ArrowLeft"||e.code==="KeyA") held.l=0;
    else if(e.code==="ArrowRight"||e.code==="KeyD") held.r=0;
    else if(e.code==="ArrowUp"||e.code==="KeyW") held.u=0;
    else if(e.code==="ArrowDown"||e.code==="KeyS") held.d=0;
    else return;
    sendKeys();
  });

  const exitBtn=$("exit");
  let exitArmed=false, exitTimer=0;
  function disarmExit(){ exitArmed=false; exitBtn.textContent="EXIT"; exitBtn.classList.remove("armed"); clearTimeout(exitTimer); }
  exitBtn.addEventListener("pointerdown",(e)=>{
    e.preventDefault(); if(meta!=="playing") return;
    if(!exitArmed){ exitArmed=true; exitBtn.textContent="END?"; exitBtn.classList.add("armed");
      clearTimeout(exitTimer); exitTimer=setTimeout(disarmExit, 2000); }
    else { disarmExit(); endRun(); }
  },{passive:false});

  async function load(){
    loading=true; mTitle.className=""; mTitle.textContent="EVILBOTNET"; mSub.innerHTML="Loading core&hellip;"; mBlink.textContent="\u00a0"; menu.classList.add("show");
    try{
      const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),20000);
      const res=await fetch("game.wasm",{cache:"no-store",signal:ctrl.signal}); clearTimeout(to);
      if(!res.ok) throw new Error("HTTP "+res.status+" fetching game.wasm");
      const mod=await WebAssembly.instantiate(await res.arrayBuffer(),{});
      w=mod.instance.exports;
      W=w.getWidth(); H=w.getHeight(); canvas.width=W; canvas.height=H;
      imageData=ctx.createImageData(W,H); fbPtr=w.getFramebuffer();
      defaultRun(); buildAbilityBar();
      w.setNodes(3); w.setStartSent(1); w.setWalls(0); w.init((Date.now()&0x7fffffff)>>>0); // idle demo swarm behind menu
      ready=true; loading=false; meta="menu";
      mSub.innerHTML="Lead your swarm onto a node to <b>infect</b> it. Clear every node to beat the level, then <b>draft an upgrade</b>. Each level escalates &mdash; how deep can you push?";
      $("legendMenu").innerHTML=legendHTML();
      mBlink.textContent="TAP TO DEPLOY";
      if(!started){ started=true; requestAnimationFrame(loop); }
    }catch(e){
      loading=false; ready=false;
      mTitle.className="bad"; mTitle.textContent="LOAD FAILED"; mSub.innerHTML=((e&&e.message)||String(e))+" &mdash; check your connection."; mBlink.textContent="TAP TO RETRY"; menu.classList.add("show");
    }
  }

  function view(){ return new Uint8ClampedArray(w.memory.buffer, fbPtr, W*H*4); }

  function hud(){
    const boss = meta==="playing" && w.getBoss && w.getBoss()===1;
    if(boss){
      elLvl.textContent="BOSS";
      const hp=w.getBossHP();
      elNodes.textContent=hp+"%";
      $("s-nodes").querySelector("span").textContent="CORE HP";
      elBar.style.width=hp+"%";
    } else {
      elLvl.textContent=run.level;
      elNodes.textContent=w.getNodesOwned()+"/"+w.getNodesTotal();
      $("s-nodes").querySelector("span").textContent="NODES";
      elBar.style.width=w.getTakeover()+"%";
    }
    elBots.textContent=w.getBots();
    if(w.getHeat) elHeat.style.width=(w.getHeat()*100)+"%";
    const playing=(meta==="playing");
    for(const b of abButtons){
      const v=b.def.get();
      b.fill.style.width=(v*100)+"%";
      b.el.classList.toggle("ready", v>=1 && playing);
    }
  }

  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000; last=now; if(dt>0.1) dt=0.1;
    w.update(dt);
    imageData.data.set(view());
    ctx.putImageData(imageData,0,0);

    if(meta==="playing"){
      const s=w.getState();
      if(s===2){ run.score += run.level*100; meta="draft"; showDraft(); }
      else if(s===3){ meta="over"; onGameOver(false); }
    }
    hud();

    const showExit=(meta==="playing");
    exitBtn.style.display = showExit ? "flex" : "none";
    if(!showExit && exitArmed) disarmExit();

    const sh=w.getShake?w.getShake():0;
    if(sh>0.3) stage.style.transform=`translate(${(Math.random()-0.5)*sh}px, ${(Math.random()-0.5)*sh}px)`;
    else if(stage.style.transform) stage.style.transform="";

    requestAnimationFrame(loop);
  }

  load();
})();
</script>
</body>
</html>
