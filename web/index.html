<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#060a09" />
<title>EVILBOTNET</title>
<style>
  :root { --grn:#3cff82; --red:#ff3c46; --amber:#ffbe46; --blu:#7ad0ff; --tea:#46e6c8; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: #040605; color: var(--grn);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overscroll-behavior: none; -webkit-user-select: none; user-select: none; touch-action: none;
  }
  body { display: flex; align-items: center; justify-content: center; }
  #stage {
    position: relative; aspect-ratio: 450 / 780;
    height: min(100svh, calc(100vw * 780 / 450)); max-height: 100svh;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 50px rgba(60,255,130,.16), 0 10px 40px rgba(0,0,0,.6);
    will-change: transform;
  }
  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; background: #060a09; }

  /* depth overlays */
  #vignette { position:absolute; inset:0; pointer-events:none; z-index:2;
    background: radial-gradient(ellipse 78% 66% at 50% 46%, transparent 52%, rgba(0,0,0,.62) 100%); }
  #scan { position:absolute; inset:0; pointer-events:none; z-index:3; opacity:.45; mix-blend-mode:multiply;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.12) 2px 3px); }

  #hud { position:absolute; inset:0; pointer-events:none; z-index:5; }
  #top {
    position:absolute; top:0; left:0; right:0; height:72px;
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; gap:8px; font-size: clamp(11px,3vmin,15px);
    background: linear-gradient(#060a09ee, #060a0900);
    text-shadow: 0 0 6px rgba(60,255,130,.4);
  }
  .stat b { display:block; font-size: clamp(15px,4.6vmin,22px); font-weight:800; line-height:1; }
  .stat span { opacity:.6; font-size: 10px; letter-spacing:1px; }
  #s-take b { color: var(--grn); }
  #s-bots b { color: #eafff1; }
  #s-nodes b { color: var(--amber); }
  #bar { position:absolute; top:72px; left:0; height:3px; background: var(--grn);
         width:0%; box-shadow: 0 0 8px var(--grn); transition: width .15s linear; }
  #heatbar { position:absolute; top:75px; left:0; height:2px; background: var(--red);
         width:0%; opacity:.85; box-shadow: 0 0 8px var(--red); transition: width .25s linear; }

  #abilities { position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    pointer-events:none; z-index:6; display:flex; gap:7px; }
  .ab { pointer-events:auto; width:74px; height:46px; border-radius:12px; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border:1px solid rgba(120,160,140,.35); background:rgba(8,16,12,.62); color:#9fb6ab;
    backdrop-filter:blur(2px); --ac:var(--grn); }
  .ab .fill { position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--ac); opacity:.18; z-index:0; }
  .ab .lab { position:relative; z-index:2; font-weight:800; font-size:13px; letter-spacing:1px; }
  .ab .key { position:relative; z-index:2; font-size:9px; opacity:.55; margin-top:1px; letter-spacing:1px; }
  .ab.ready { border-color:var(--ac); color:var(--ac); box-shadow:0 0 13px color-mix(in srgb, var(--ac) 45%, transparent); }
  .ab.ready .fill { width:100% !important; opacity:.26; }
  .ab-surge { --ac:#eafff1; } .ab-emp { --ac:var(--blu); }
  .ab-fork  { --ac:var(--grn); } .ab-cloak { --ac:var(--tea); }

  #center {
    position:absolute; inset:0; display:none; pointer-events:none; z-index:7;
    flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:26px;
    background: radial-gradient(ellipse at center, rgba(4,6,5,.55), rgba(4,6,5,.9));
  }
  #center.show { display:flex; }
  #title { font-size: clamp(26px,8.5vmin,46px); font-weight:900; letter-spacing:3px; color:#eafff1;
           text-shadow: 0 0 18px rgba(60,255,130,.6); }
  #title.bad { color:#ffd2d4; text-shadow: 0 0 18px rgba(255,60,70,.6); }
  #sub { font-size: clamp(12px,3.6vmin,16px); color:#9fdcb6; max-width:300px; line-height:1.5; }
  #blink { color: var(--amber); font-weight:800; letter-spacing:1px; animation: blink 1.1s steps(2,start) infinite; }
  @keyframes blink { 50% { opacity:0; } }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="screen" width="450" height="780"></canvas>
    <div id="vignette"></div>
    <div id="scan"></div>
    <div id="hud">
      <div id="top">
        <div class="stat" id="s-take"><b>0%</b><span>TAKEOVER</span></div>
        <div class="stat" id="s-bots" style="text-align:center"><b>0</b><span>BOTS</span></div>
        <div class="stat" id="s-nodes" style="text-align:right"><b>1/12</b><span>NODES</span></div>
      </div>
      <div id="bar"></div>
      <div id="heatbar"></div>
    </div>
    <div id="abilities">
      <div class="ab ab-surge" id="b-surge"><div class="fill"></div><div class="lab">SURGE</div><div class="key">SPACE</div></div>
      <div class="ab ab-emp"   id="b-emp"><div class="fill"></div><div class="lab">EMP</div><div class="key">Q</div></div>
      <div class="ab ab-fork"  id="b-fork"><div class="fill"></div><div class="lab">FORK</div><div class="key">F</div></div>
      <div class="ab ab-cloak" id="b-cloak"><div class="fill"></div><div class="lab">CLOAK</div><div class="key">C</div></div>
    </div>
    <div id="center" class="show">
      <div id="title">EVILBOTNET</div>
      <div id="sub">Loading core&hellip;</div>
      <div id="blink">&nbsp;</div>
    </div>
  </div>

<script>
(function () {
  const stage = document.getElementById("stage");
  const canvas = document.getElementById("screen");
  const ctx = canvas.getContext("2d", { alpha: false });
  ctx.imageSmoothingEnabled = false;

  const $ = (id) => document.getElementById(id);
  const elTake=$("s-take").querySelector("b"), elBots=$("s-bots").querySelector("b"),
        elNodes=$("s-nodes").querySelector("b"), elBar=$("bar"), elHeat=$("heatbar"),
        elCenter=$("center"), elTitle=$("title"), elSub=$("sub"), elBlink=$("blink");

  const ab = {
    surge:{el:$("b-surge"), fill:$("b-surge").querySelector(".fill"), get:()=>w.getSurge(), act:()=>w.press()},
    emp:  {el:$("b-emp"),   fill:$("b-emp").querySelector(".fill"),   get:()=>w.getEmp(),   act:()=>w.abEmp()},
    fork: {el:$("b-fork"),  fill:$("b-fork").querySelector(".fill"),  get:()=>w.getFork(),  act:()=>w.abFork()},
    cloak:{el:$("b-cloak"), fill:$("b-cloak").querySelector(".fill"), get:()=>w.getCloak(), act:()=>w.abCloak()},
  };

  let w=null, ready=false, loading=false, started=false;
  let W=450, H=780, imageData=null, fbPtr=0;

  function overlay(title, sub, blink, bad) {
    elCenter.classList.add("show");
    elTitle.className = bad ? "bad" : "";
    elTitle.textContent = title;
    elSub.innerHTML = sub;
    elBlink.textContent = blink || "\u00a0";
  }

  // ---- input ----
  function pt(e){ const t=(e.touches&&e.touches[0])?e.touches[0]:e; return [t.clientX,t.clientY]; }
  function rally(cx,cy){ const r=canvas.getBoundingClientRect(); w.pointerMove((cx-r.left)/r.width,(cy-r.top)/r.height); }
  canvas.addEventListener("pointerdown",(e)=>{
    e.preventDefault();
    if(!ready){ if(!loading) load(); return; }
    const [x,y]=pt(e); rally(x,y);
    const s=w.getState(); if(s===0||s===2||s===3) w.press();
  },{passive:false});
  canvas.addEventListener("pointermove",(e)=>{ if(!ready) return; e.preventDefault(); const[x,y]=pt(e); rally(x,y); },{passive:false});

  for (const key of Object.keys(ab)) {
    ab[key].el.addEventListener("pointerdown",(e)=>{ e.preventDefault(); if(ready && w.getState()===1) ab[key].act(); },{passive:false});
  }

  const held={l:0,r:0,u:0,d:0};
  function sendKeys(){ if(ready) w.keyDir(held.r-held.l, held.d-held.u); }
  addEventListener("keydown",(e)=>{
    if(e.code==="ArrowLeft"||e.code==="KeyA") held.l=1;
    else if(e.code==="ArrowRight"||e.code==="KeyD") held.r=1;
    else if(e.code==="ArrowUp"||e.code==="KeyW") held.u=1;
    else if(e.code==="ArrowDown"||e.code==="KeyS") held.d=1;
    else if(e.code==="Space"||e.code==="Enter"){ e.preventDefault(); if(ready) w.press(); return; }
    else if(e.code==="KeyQ"){ if(ready&&w.getState()===1) w.abEmp(); return; }
    else if(e.code==="KeyF"){ if(ready&&w.getState()===1) w.abFork(); return; }
    else if(e.code==="KeyC"){ if(ready&&w.getState()===1) w.abCloak(); return; }
    else return;
    e.preventDefault(); sendKeys();
  });
  addEventListener("keyup",(e)=>{
    if(e.code==="ArrowLeft"||e.code==="KeyA") held.l=0;
    else if(e.code==="ArrowRight"||e.code==="KeyD") held.r=0;
    else if(e.code==="ArrowUp"||e.code==="KeyW") held.u=0;
    else if(e.code==="ArrowDown"||e.code==="KeyS") held.d=0;
    else return;
    sendKeys();
  });

  async function load(){
    loading=true; overlay("EVILBOTNET","Loading core&hellip;","");
    try{
      const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),20000);
      const res=await fetch("game.wasm",{cache:"no-store",signal:ctrl.signal}); clearTimeout(to);
      if(!res.ok) throw new Error("HTTP "+res.status+" fetching game.wasm");
      const bytes=await res.arrayBuffer();
      const mod=await WebAssembly.instantiate(bytes,{});
      w=mod.instance.exports;
      W=w.getWidth(); H=w.getHeight(); canvas.width=W; canvas.height=H;
      imageData=ctx.createImageData(W,H); fbPtr=w.getFramebuffer();
      w.init((Date.now()&0x7fffffff)>>>0);
      ready=true; loading=false;
      if(!started){ started=true; requestAnimationFrame(loop); }
    }catch(e){
      loading=false; ready=false;
      overlay("LOAD FAILED",((e&&e.message)||String(e))+" &mdash; check your connection.","TAP TO RETRY",true);
    }
  }

  function view(){ return new Uint8ClampedArray(w.memory.buffer, fbPtr, W*H*4); }

  function hud(){
    const s=w.getState(), take=w.getTakeover();
    elTake.textContent=take+"%"; elBots.textContent=w.getBots();
    elNodes.textContent=w.getNodesOwned()+"/"+w.getNodesTotal();
    elBar.style.width=take+"%";
    if(w.getHeat) elHeat.style.width=(w.getHeat()*100)+"%";

    const playing=(s===1);
    for(const key of Object.keys(ab)){
      const v=ab[key].get();
      ab[key].fill.style.width=(v*100)+"%";
      ab[key].el.classList.toggle("ready", v>=1 && playing);
    }

    if(s===0){
      overlay("EVILBOTNET",
        "Drag to lead your swarm onto a node and <b>infect</b> it. Red <b>sentinels</b> hunt you. Tap <b>SURGE</b> to shield + punch through, <b>EMP</b> to freeze them, <b>FORK</b> to mass more bots, <b>CLOAK</b> to vanish. Take the whole net &mdash; every node raises <b>HEAT</b>.",
        "TAP TO DEPLOY");
    } else if(s===2){
      overlay("NETWORK OWNED","Full takeover. The botnet is yours.","TAP TO REDEPLOY");
    } else if(s===3){
      overlay("SWARM WIPED","EDR dismantled the botnet. Owned "+w.getNodesOwned()+"/"+w.getNodesTotal()+" nodes.","TAP TO REDEPLOY",true);
    } else { elCenter.classList.remove("show"); }
  }

  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000; last=now; if(dt>0.1) dt=0.1;
    w.update(dt);
    imageData.data.set(view());
    ctx.putImageData(imageData,0,0);
    hud();
    // screen shake
    const sh = w.getShake ? w.getShake() : 0;
    if(sh>0.3){ stage.style.transform = `translate(${(Math.random()-0.5)*sh}px, ${(Math.random()-0.5)*sh}px)`; }
    else if(stage.style.transform){ stage.style.transform=""; }
    requestAnimationFrame(loop);
  }

  load();
})();
</script>
</body>
</html>
